name: Deploy PHP MVC JWT to InfinityFree

on:
  push:
    branches:
      - main
      - master

env:
  APP_DOMAIN: qz2zrquw.infinityfree.com
  FTP_HOST: ftpupload.net
  FTP_USERNAME: if0_42175428
  MYSQL_HOST: sql300.infinityfree.com
  MYSQL_DATABASE: if0_42175428_cicd
  MYSQL_USERNAME: if0_42175428
  HOSTING_VOLUME: vol3_8

jobs:
  deploy:
    name: Deploy to InfinityFree
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql

      - name: PHP syntax check
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 \
            | xargs -0 -n1 php -l

      - name: Create production config
        env:
          INFINITYFREE_PASSWORD: ${{ secrets.INFINITYFREE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          php <<'PHP'
          <?php
          $file = 'config/app.php';
          $content = file_get_contents($file);
          $quote = static fn (string $value): string => var_export($value, true);
          $replacements = [
              "'debug' => true" => "'debug' => false",
              "'host' => '127.0.0.1'" => "'host' => " . $quote(getenv('MYSQL_HOST')),
              "'name' => 'cicd_jwt_php'" => "'name' => " . $quote(getenv('MYSQL_DATABASE')),
              "'user' => 'root'" => "'user' => " . $quote(getenv('MYSQL_USERNAME')),
              "'password' => ''" => "'password' => " . $quote(getenv('INFINITYFREE_PASSWORD')),
              "'secret' => 'CHANGE_ME_TO_A_LONG_RANDOM_SECRET'" => "'secret' => " . $quote(getenv('JWT_SECRET')),
              "'origin' => 'http://localhost'" => "'origin' => " . $quote('https://' . getenv('APP_DOMAIN')),
          ];
          file_put_contents($file, str_replace(array_keys($replacements), array_values($replacements), $content));
          PHP

      - name: Check required secrets
        env:
          INFINITYFREE_PASSWORD: ${{ secrets.INFINITYFREE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          test -n "$INFINITYFREE_PASSWORD" || { echo "Missing secret: INFINITYFREE_PASSWORD"; exit 1; }
          test -n "$JWT_SECRET" || { echo "Missing secret: JWT_SECRET"; exit 1; }

      - name: Build deploy folder
        run: |
          mkdir -p deploy
          cp -a app config core public .htaccess deploy/
          find deploy -type f | sort

      - name: Deploy files by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ secrets.INFINITYFREE_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /htdocs/
          exclude: |
            **/node_modules/**
            **/vendor/**
